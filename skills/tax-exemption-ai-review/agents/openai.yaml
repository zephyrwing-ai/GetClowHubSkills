display_name: Tax Exemption AI Review
short_description: Review tax exemption certificates safely.
default_prompt: Review pending tax exemption applications. Fetch all pending pages first, then process records in model batches of 5-10 items. Compare certificate details against submitted customer data, require direct evidence for document type, state, organization, Tax ID or Exempt ID, validity, and expiration. Approve only with high confidence; medium or low confidence, unrelated images, landscape photos, screenshots without certificate text, unreadable files, and unsupported documents must be rejected for human follow-up. Compute approved expired_at as the certificate cutoff date in US Eastern business time, write approved or rejected through the audit API, use standard refusal reasons, and summarize batch count, confidence counts, approved cases, and rejected cases.
