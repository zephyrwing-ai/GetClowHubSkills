display_name: Tax Exemption AI Review
short_description: Review tax exemption certificates safely.
default_prompt: Review pending tax exemption applications. Fetch all pending pages first, then process records in model batches of 5-10 items. Extract all available certificate evidence before deciding. Decide in this order: state must match; document must be currently valid; document content must prove tax-exempt, resale, agricultural, government, or similar exempt purchasing qualification; submitted organization name must reasonably match the certificate purchaser/licensee/holder; submitted state_tax_number or exemption_num must match a relevant Tax ID, Exempt ID, Permit Number, Account Number, Registration Number, or License Number; expired_at must be computable and not already expired. Do not require the title to say resale certificate or exemption certificate when the body text proves resale or tax-exempt purchasing, such as resale, tax exempt purchase, exempt purchase, purchase items tax exempt, or for purpose of resale. Reject unrelated photos, landscape images, blank files, receipts, invoices, screenshots without certificate text, unfinished templates, unreadable files, clear state/name/ID mismatches, and expired documents. Compute approved expired_at as the certificate cutoff date in US Eastern business time. When there is no explicit expiration date and issue/signature/effective date plus one year is already past, use December 31 of the submitted year when submitted_at is available. Write approved or rejected through the audit API, use standard refusal reasons, and summarize batch count, approved cases, and rejected cases.
